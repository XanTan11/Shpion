<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шпион</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🕵️ Шпион</h1>

<div id="setup">
  <p>Количество игроков:</p>
  <input type="number" id="players" value="5" min="3" max="20">

  <p>Выберите тему:</p>
  <select id="theme">
    <option value="football">Футбол ⚽</option>
    <option value="brawl">Brawl Stars 🌟</option>
    <option value="clash">Clash Royale 🏰</option>
    <option value="actors">Актёры 🎭</option>
  </select>

  <button onclick="startGame()">Начать игру</button>
</div>

<div id="game" class="hidden">
  <h2 id="playerText"></h2>
  <button onclick="showRole()">Показать роль</button>

  <h1 id="role" class="hidden"></h1>

  <button onclick="nextPlayer()" class="hidden" id="nextBtn">Следующий</button>
  <button onclick="endGame()" class="hidden" id="endBtn">Завершить игру</button>
</div>

</div>

<script>
// 50+ персонажей для каждой темы (на русском)
const themes = {
  football: [
    "Месси","Роналду","Неймар","Мбаппе","Левандовский","Салах","Кейн","Де Брюйне","Модрич","Хазард",
    "Киммих","Ван Дейк","Мане","Гризманн","Обамеянг","Стерлинг","Сон","Хааланд","Бензема","Верратти",
    "Каземиро","Алисон","Эдерсон","Рамос","Пике","Тьяго Силва","Буффон","Куртуа","Фоден","Грилиш",
    "Санчо","Жоржиньо","Мюллер","Канте","Погба","Дибала","Рашфорд","Родри","Давид Силва","Уокер",
    "Триппьер","Магуайр","Де Хеа","Берарди","Инсинье","Кьеза","Хаверц","Гнабри","Сане","Тадич",
    "Кака","Роналдиньо","Роналдо","Шевченко","Тотти","Зидан","Бэйл","Иньеста","Пирло","Рибери",
    "Руни","Тевес","Мертезакер","Каннаваро","Роббен","Фабиан","Фабрегас","Пике","Марез","Канте2"
  ],
  brawl: [
    "Шелли","Колт","Джесси","Нита","Спайк","Леон","Ворон","Поко","Барли","Брок",
    "Динамайк","Эль Примо","Бо","Тик","Мортис","Карл","Роза","Пэм","Фрэнк","Биби",
    "Беа","Макс","Джеки","Джин","Сэнди","Эмз","Мистер П","Спрaут","Байрон","Эдгар",
    "Грифф","Бонни","Колетт","Базз","Стю","Белл","Лу","Жанет","Мег","Рико",
    "Бастер","Эмбер","Фэнг","Сэм","Тара","Памела","Гейл","Колт2","Джек","Базз2",
    "Спайк2","Леон2","Ворон2","Поко2","Барли2","Брок2","Динамайк2","Эль Примо2","Бо2","Тик2"
  ],
  clash: [
    "Рыцарь","Лучница","Гигант","Волшебник","Малыш Дракон","Хог Рейдер","Валькирия","ПЕКА","Шахтёр","Гоблин",
    "Огненный шар","Ледяной дух","Скелеты","Мушкетёр","Пушка","Тесла","Барабаны","Воздушный шар","Дровосек","Электро волшебник",
    "Тёмный принц","Ледяной волшебник","Принцесса","Мега Миньон","Королевский призрак","Охотник","Баран Рейдер","Заппиз","Гоблин Баррель","Летающая машина",
    "Элитные варвары","Боевая барабанная команда","Три мушкетёра","Печь","Бомбовая башня","Гигант Скелет","Инферно Дракон","Ночная ведьма","Мини ПЕКА","Ракета",
    "Зеркало","Клон","Целительный дух","Огненные духи","Ледяной голем","Пушка-карета","Летающая машина2","Гоблин Кейс","Искра","Мега Рыцарь",
    "Королевский гигант","Ледяной принц","Гоблин Бочка","Огненный дракон","Скелетный дракон","Мушкетёр2","Валькирия2","Мега миньон2","Рыцарь2","Арбалетчик"
  ],
  actors: [
    "Том Хэнкс","Леонардо ДиКаприо","Брэд Питт","Джонни Депп","Роберт Дауни младший","Уилл Смит","Мэтт Дэймон","Крис Хемсворт","Крис Эванс","Дензел Вашингтон",
    "Морган Фриман","Хью Джекман","Киану Ривз","Кристиан Бэйл","Хоакин Феникс","Марк Уолберг","Райан Рейнольдс","Том Круз","Рассел Кроу","Сэмюэл Л. Джексон",
    "Иэн МакКеллен","Патрик Стюарт","Дэниел Рэдклифф","Эмма Уотсон","Скарлетт Йоханссон","Натали Портман","Анджелина Джоли","Дженнифер Лоуренс","Энн Хэтэуэй","Галь Гадот",
    "Роберт Паттинсон","Крис Пратт","Зои Салдана","Вин Дизель","Джейсон Момоа","Эмма Стоун","Райан Гослинг","Марго Робби","Харрисон Форд","Кейт Бланшетт",
    "Мэтт Леблан","Мэттью Перри","Кортни Кокс","Дженнифер Энистон","Лиза Кудроу","Дэвид Швиммер","Том Холланд","Зендея","Дуэйн Джонсон","Вин Дизель2"
  ]
};

let roles = [];
let currentPlayer = 0;
let totalPlayers = 0;

function startGame() {
  totalPlayers = parseInt(document.getElementById("players").value);
  const selectedTheme = document.getElementById("theme").value;
  const pool = themes[selectedTheme];

  roles = [];

  // одинаковая роль для всех кроме шпиона
  const mainRole = pool[Math.floor(Math.random() * pool.length)];

  for (let i = 0; i < totalPlayers - 1; i++) {
    roles.push(mainRole);
  }

  roles.push("🕵️ ШПИОН");
  roles.sort(() => Math.random() - 0.5);

  currentPlayer = 0;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("endBtn").classList.remove("hidden");

  updatePlayer();
}

function updatePlayer() {
  document.getElementById("playerText").innerText = "Игрок " + (currentPlayer + 1);
  document.getElementById("role").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
}

function showRole() {
  document.getElementById("role").innerText = roles[currentPlayer];
  document.getElementById("role").classList.remove("hidden");
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextPlayer() {
  currentPlayer++;

  if (currentPlayer >= totalPlayers) {
    document.getElementById("playerText").innerText = "Игра началась!";
    document.getElementById("role").innerText = "Обсуждайте 😈";
    document.getElementById("nextBtn").style.display = "none";
    return;
  }

  updatePlayer();
}

function endGame() {
  location.reload();
}
</script>

</body>
</html>
